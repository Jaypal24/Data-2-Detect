<!DOCTYPE html>
<html>
<head>
    <title>Traffic Sign Detector</title>
</head>
<body>
    <h2>Upload a Traffic Sign Image</h2>
    <form action="/predict" method="POST" enctype="multipart/form-data">
        <input type="file" name="image" accept="image/*">
        <input type="submit" value="Detect & Classify">
    </form>

    {% if result_img %}
        <h3>Result:</h3>
        <img src="{{ result_img }}" width="600">
    {% endif %}
</body>
</html>
